name: Update bank codes

on:
  schedule:
    - cron: "0 3 * * 3"
  workflow_dispatch: # Allows manual run

permissions:
  contents: write
  pull-requests: write

jobs:
  update-bank-codes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install the project
        run: uv sync --dev

      - name: Run script
        id: script
        run: |
          output=$(uv run generate_bank_list.py)
          echo "message=$output" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: git-check
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          commit-message: ${{ steps.script.outputs.message }}
          branch: automated/bank-codes-update
          delete-branch: true
          title: Automatic bank codes update
